plugins {
    alias(libs.plugins.android.library)
}

android {
    namespace 'co.rottor.vehiclelink'
    compileSdk 36

    defaultConfig {
        minSdk 24
    }

    buildFeatures {
        aidl true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    api project(':rrt-proto')
}
